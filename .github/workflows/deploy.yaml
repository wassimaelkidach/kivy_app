name: Deploy FastAPI to DigitalOcean Droplet

on:
  push:
    branches:
      - login # <--- Change to your deployment branch (e.g., main, master, login)

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Action to check out your repository code

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0 # Action to set up SSH agent with your private key
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} # Use the private key secret

      - name: Deploy to Droplet via SSH
        env:
          # Expose the DOCKER_ENV_VARS secret as an environment variable for the script
          # This is how the script will access the content of your .env file
          DOCKER_ENV_VARS_CONTENT: ${{ secrets.DOCKER_ENV_VARS }}
        run: |
          # Define the path to your project on the Droplet
          PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app" # <--- This is your project root
          DEPLOY_DIR_ON_DROPLET="${PROJECT_ROOT_ON_DROPLET}/deploy"

          # Step 1: Navigate to the project root and ensure it's up to date
          # Create the directory if it doesn't exist (for the very first run)
          mkdir -p "${PROJECT_ROOT_ON_DROPLET}"
          cd "${PROJECT_ROOT_ON_DROPLET}" # <--- NOW IN THE ROOT OF YOUR PROJECT ON DROPLET

          # Check if it's already a git repository
          if [ -d .git ]; then
            echo "Git repository found. Pulling latest changes..."
            git pull origin ${{ github.ref_name }} # <--- THIS IS THE PULL COMMAND
          else
            echo "No Git repository found. Cloning the repository..."
            git clone https://github.com/${{ github.repository }}.git .
            git checkout ${{ github.ref_name }}
          fi

          # Step 2: Prepare the deploy directory and .env file
          # After git pull/clone, the 'deploy' folder and its contents will be present.
          cd "${DEPLOY_DIR_ON_DROPLET}" # <--- NOW IN THE DEPLOY SUBDIRECTORY

          # Create/Update the .env file in this directory
          echo "${DOCKER_ENV_VARS_CONTENT}" > .env
          echo "Created/Updated .env file."

          # Step 3: Bring up the Docker Compose services
          echo "Running docker compose up..."
          docker compose up -d --build # <--- THIS IS DOCKER COMPOSE, RUN AFTER PULL
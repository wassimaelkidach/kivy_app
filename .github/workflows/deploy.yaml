name: Deploy FastAPI to DigitalOcean Droplet

on:
  push:
    branches:
      - login

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Droplet via SSH
        env:
          DOCKER_ENV_VARS_CONTENT: ${{ secrets.DOCKER_ENV_VARS }}
        run: |
          export PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app"
          export DOCKER_ENV_VARS_CONTENT="${{ secrets.DOCKER_ENV_VARS }}"
          export DEPLOY_BRANCH="${{ github.ref_name }}"
          export REPO_URL="https://github.com/${{ github.repository }}.git"
        
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} -T << 'EOF'
            echo "--- Starting deployment on Droplet ---"

            PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app"
            BACK_DIR="\$PROJECT_ROOT_ON_DROPLET/back"
            DOCKER_COMPOSE_FILE="\$PROJECT_ROOT_ON_DROPLET/docker/docker-compose.fast.yaml"

            mkdir -p "\$PROJECT_ROOT_ON_DROPLET"
            cd "\$PROJECT_ROOT_ON_DROPLET" || exit 1

            if [ -d .git ]; then
              echo "Git repo exists. Pulling changes..."
              git pull origin $DEPLOY_BRANCH
            else
              echo "Cloning repository..."
              git clone $REPO_URL .
              git checkout $DEPLOY_BRANCH
            fi

            echo "Writing .env to back/ folder"
            echo "$DOCKER_ENV_VARS_CONTENT" > "\$BACK_DIR/.env"

            echo "Bringing up Docker Compose services using: \$DOCKER_COMPOSE_FILE"
            docker compose -f "\$DOCKER_COMPOSE_FILE" up -d --build

            echo "Cleaning up unused images..."
            docker image prune -f

            echo "--- Deployment completed successfully ---"
          EOF

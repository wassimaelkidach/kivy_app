name: Deploy FastAPI to DigitalOcean Droplet

on:
  push:
    branches:
      - login # <--- Your deployment branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Droplet via SSH
        env:
          DOCKER_ENV_VARS_CONTENT: ${{ secrets.DOCKER_ENV_VARS }}
        run: |
          # Set paths and environment content before SSH
          export PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app"
          export DEPLOY_DIR_ON_DROPLET="${PROJECT_ROOT_ON_DROPLET}/deploy"
          export DOCKER_ENV_VARS_CONTENT="${{ secrets.DOCKER_ENV_VARS }}"
          export DEPLOY_BRANCH="${{ github.ref_name }}"
          export REPO_URL="https://github.com/${{ github.repository }}.git"
        
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} -T << EOF
            echo "--- Starting deployment on Droplet ---"
        
            mkdir -p "$PROJECT_ROOT_ON_DROPLET"
            cd "$PROJECT_ROOT_ON_DROPLET" || { echo "Failed to cd to \$PROJECT_ROOT_ON_DROPLET"; exit 1; }
        
            if [ -d .git ]; then
              echo "Git repo exists. Pulling changes..."
              git pull origin $DEPLOY_BRANCH
            else
              echo "Cloning repository..."
              git clone $REPO_URL .
              git checkout $DEPLOY_BRANCH
            fi
        
            echo "Writing .env to project root"
            echo "$DOCKER_ENV_VARS_CONTENT" > "$PROJECT_ROOT_ON_DROPLET/.env"
        
            echo "Navigating to deploy folder: $DEPLOY_DIR_ON_DROPLET"
            cd "$DEPLOY_DIR_ON_DROPLET" || { echo "Failed to cd to \$DEPLOY_DIR_ON_DROPLET"; exit 1; }
        
            echo "Bringing up Docker Compose services..."
            docker compose up -d --build
        
            echo "Cleaning up unused images..."
            docker image prune -f
        
            echo "--- Deployment completed successfully ---"
          EOF
name: Deploy FastAPI to DigitalOcean Droplet

on:
  push:
    branches:
      - login # <--- Your deployment branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Droplet via SSH
        env:
          DOCKER_ENV_VARS_CONTENT: ${{ secrets.DOCKER_ENV_VARS }}
        run: |
          export PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app"
          export DEPLOY_DIR_ON_DROPLET="${PROJECT_ROOT_ON_DROPLET}/deploy"
          export DOCKER_ENV_VARS_CONTENT="${{ secrets.DOCKER_ENV_VARS }}"
        
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} -T << EOF
            echo "--- Starting commands on Droplet ---"
        
            mkdir -p "$PROJECT_ROOT_ON_DROPLET"
            cd "$PROJECT_ROOT_ON_DROPLET" || { echo "Failed to cd"; exit 1; }
        
            if [ -d .git ]; then
              git pull origin ${{ github.ref_name }}
            else
              git clone https://github.com/${{ github.repository }}.git .
              git checkout ${{ github.ref_name }}
            fi
        
            cd "$DEPLOY_DIR_ON_DROPLET" || { echo "Failed to cd to deploy"; exit 1; }
        
            echo "$DOCKER_ENV_VARS_CONTENT" > .env
            docker compose up -d --build
            docker image prune -f
        
            echo "--- Deployment complete ---"
          EOF
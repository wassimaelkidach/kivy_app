version: '3.8'

services:
  web:
    build:
      context: ..                      # Root of the project
      dockerfile: deploy/Dockerfile   # Path to Dockerfile from the context
    ports:
      - "8000:8000"
    env_file:
      - ../.env                        # Load env vars from the root .env file
    environment:
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}?charset=utf8mb4"
    depends_on:
      - db
    volumes:
      - ../:/app                       # Mount the whole app directory
    restart: always

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - ../.env                        # Use the same .env for DB credentials
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:

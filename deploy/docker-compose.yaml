name: Deploy FastAPI to DigitalOcean Droplet

on:
  push:
    branches:
      - login # <--- Your deployment branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Droplet via SSH
        env:
          DOCKER_ENV_VARS_CONTENT: ${{ secrets.DOCKER_ENV_VARS }}
        run: |
          # Define the path to your project on the Droplet
          PROJECT_ROOT_ON_DROPLET="/var/www/kivy_app" # <--- CONFIRM THIS IS THE ABSOLUTE PATH
          DEPLOY_DIR_ON_DROPLET="${PROJECT_ROOT_ON_DROPLET}/deploy"

          # --- Step 1: Navigate to the project root and ensure it's up to date ---
          # Create the directory if it doesn't exist (for the very first run)
          mkdir -p "${PROJECT_ROOT_ON_DROPLET}"
          cd "${PROJECT_ROOT_ON_DROPLET}"

          # Check if it's already a git repository
          if [ -d .git ]; then
            echo "Git repository found. Pulling latest changes..."
            git pull origin ${{ github.ref_name }} # Pull from the branch that triggered the action
          else
            echo "No Git repository found. Cloning the repository..."
            git clone https://github.com/${{ github.repository }}.git . # Clone into the current directory
            git checkout ${{ github.ref_name }} # Checkout the correct branch
          fi

          # --- Step 2: Prepare the deploy directory and .env file ---
          cd "${DEPLOY_DIR_ON_DROPLET}" # Navigate to the directory containing docker-compose.yaml

          # Create/Update the .env file with secrets for Docker Compose
          echo "${DOCKER_ENV_VARS_CONTENT}" > .env
          echo "Created/Updated .env file."


          # --- Step 3: Bring up the Docker Compose services ---
          echo "Running docker compose up..."
          docker compose up -d --build

          # Optional: Clean up old Docker images to save disk space
          # docker image prune -f

          echo "Deployment complete!"